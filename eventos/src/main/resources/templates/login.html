<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | EventPass</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <main class="container" style="display: flex; justify-content: center; align-items: center;">
        <div class="form-container">
            <h1 style="text-align: center; color: var(--primary-color);">Bienvenido de nuevo</h1>
            <p style="text-align: center; color: var(--text-light); margin-bottom: 2rem;">Inicia sesión para gestionar tus entradas.</p>

            <div th:if="${param.error}" style="background-color: #fee2e2; color: var(--danger-color); padding: 0.75rem; border-radius: 6px; margin-bottom: 1.5rem; text-align: center;">
                Email o contraseña incorrectos.
            </div>
            <div th:if="${param.logout}" style="background-color: #d1fae5; color: var(--success-color); padding: 0.75rem; border-radius: 6px; margin-bottom: 1.5rem; text-align: center;">
                Sesión cerrada correctamente.
            </div>

            <form method="post" th:action="@{/login}">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input id="email" name="email" type="email" class="form-control" placeholder="tu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="contrasena">Contraseña</label>
                    <input id="contrasena" name="contrasena" type="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block" style="font-size: 1rem; padding: 0.75rem;">Iniciar Sesión</button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem;">
                ¿No tienes cuenta? <a th:href="@{/register}">Regístrate aquí</a>
            </p>
        </div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
</body>
</html>
