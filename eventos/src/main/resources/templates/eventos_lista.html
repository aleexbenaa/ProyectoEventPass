<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos | EventPass</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <main class="container">
        <div class="admin-header">
            <div>
                <h1>Próximos Eventos</h1>
                <p style="color: var(--text-light);">Descubre los mejores eventos y reserva tu entrada.</p>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(eventos)}" class="form-container" style="text-align: center; max-width: 600px;">
            <p>No hay eventos disponibles en este momento.</p>
        </div>

        <div class="events-grid" th:if="${!#lists.isEmpty(eventos)}">
            <div class="card" th:each="evento : ${eventos}">
                <div class="card-img">
                    <img th:if="${evento.imagenUrl != null}" th:src="${evento.imagenUrl}" th:alt="${'Imagen de ' + evento.nombre}">
                    <span th:if="${evento.imagenUrl == null}" th:text="${evento.nombre}">Imagen del Evento</span>
                </div>
                <div class="card-body">
                    <h3 class="card-title" th:text="${evento.nombre}">Nombre del Evento</h3>
                    <span class="card-date" th:text="${#temporals.format(evento.fechaInicio, 'dd/MM/yyyy HH:mm')} + ' - ' + ${evento.ubicacion}">Fecha y Lugar</span>
                    <p th:text="${#strings.abbreviate(evento.descripcion, 100)}">Descripción del evento...</p>
                    <a th:href="@{/eventos/{id}(id=${evento.id})}" class="btn btn-primary btn-block" style="margin-top: 1rem;">Ver Detalle</a>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
</body>
</html>
