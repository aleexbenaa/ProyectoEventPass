<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos</title>
</head>
<body>
    <nav>
        <a th:href="@{/eventos}">Eventos</a>
        <a sec:authorize="isAuthenticated()" th:href="@{/mis_entradas}">Mis entradas</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/eventos}">Panel admin</a>
        <a sec:authorize="isAnonymous()" th:href="@{/login}">Login</a>
        <a sec:authorize="isAnonymous()" th:href="@{/register}">Registro</a>
        <a sec:authorize="isAuthenticated()" th:href="@{/logout}">Cerrar sesión</a>
    </nav>

    <h1>Eventos publicados</h1>

    <p th:if="${#lists.isEmpty(eventos)}">No hay eventos publicados.</p>

    <ul th:if="${!#lists.isEmpty(eventos)}">
        <li th:each="evento : ${eventos}">
            <strong th:text="${evento.nombre}">Nombre evento</strong>
            <span> - </span>
            <span th:text="${evento.ubicacion}">Ubicación</span>
            <a th:href="@{/eventos/{id}(id=${evento.id})}">Ver detalle</a>
        </li>
    </ul>
</body>
</html>
