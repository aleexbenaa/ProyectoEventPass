<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${evento.id == null ? 'Nuevo Evento | Admin EventPass' : 'Editar Evento | Admin EventPass'}">Formulario Evento</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <main class="container">
        <div class="form-container" style="max-width: 800px;">
            <div class="admin-header" style="margin-bottom: 1.5rem;">
                <div>
                    <h1 style="color: var(--primary-color);" th:text="${evento.id == null ? 'Crear Nuevo Evento' : 'Editar Evento'}">Evento</h1>
                    <p style="color: var(--text-light);">Completa los datos necesarios para tu evento.</p>
                </div>
            </div>

            <!-- Usamos un solo formulario que cambia su ruta dependiendo de si estamos creando o editando -->
            <form method="post" enctype="multipart/form-data" th:action="${evento.id == null ? '/admin/eventos' : '/admin/eventos/' + evento.id}" th:object="${evento}">

                <div class="form-group">
                    <label for="nombre">Nombre del Evento</label>
                    <input type="text" id="nombre" th:field="*{nombre}" class="form-control" placeholder="Ej. Concierto de Verano" required>
                </div>

                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" th:field="*{descripcion}" class="form-control" rows="5" placeholder="Detalles, información importante, qué esperar..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="ubicacion">Ubicación</label>
                    <input type="text" id="ubicacion" th:field="*{ubicacion}" class="form-control" placeholder="Ej. Sala de Conciertos A, Madrid" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="fechaInicio">Fecha y Hora de Inicio</label>
                        <input type="datetime-local" id="fechaInicio" th:field="*{fechaInicio}" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="fechaFin">Fecha y Hora de Fin</label>
                        <input type="datetime-local" id="fechaFin" th:field="*{fechaFin}" class="form-control" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="capacidad">Capacidad Máxima</label>
                    <input type="number" id="capacidad" th:field="*{capacidad}" class="form-control" min="1" placeholder="Ej. 100" required>
                </div>

                <div class="form-group">
                    <label for="imagenFile">Imagen del Evento</label>
                    <input type="file" id="imagenFile" name="imagenFile" class="form-control" accept="image/*">
                    <small style="color: var(--text-light); display: block; margin-top: 0.35rem;">
                        Formatos recomendados: JPG/PNG/WebP. Si editas un evento y subes otra imagen, reemplaza la actual.
                    </small>
                    <div th:if="${evento.imagenUrl != null}" style="margin-top: 0.75rem;">
                        <img th:src="${evento.imagenUrl}" alt="Imagen actual del evento" style="max-width: 220px; border-radius: 8px; border: 1px solid var(--border-color);">
                    </div>
                </div>

                <!-- Selección de validadores opcional (si tu controlador lo necesita) -->
                <div class="form-group" th:if="${validadoresDisponibles != null and !#lists.isEmpty(validadoresDisponibles)}">
                    <label>Asignar Validadores</label>
                    <div style="border: 1px solid var(--border-color); padding: 1rem; border-radius: 6px; max-height: 150px; overflow-y: auto;">
                        <div th:each="validador : ${validadoresDisponibles}" style="margin-bottom: 0.5rem;">
                            <input type="checkbox" name="validadoresIds" th:value="${validador.id}"
                                   th:id="${'val_' + validador.id}"
                                   th:checked="${validadoresSeleccionadosIds != null and #lists.contains(validadoresSeleccionadosIds, validador.id)}">
                            <label th:for="${'val_' + validador.id}" th:text="${validador.nombre + ' (' + validador.email + ')'}" style="display: inline; font-weight: normal; margin-left: 0.5rem;"></label>
                        </div>
                    </div>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                    <button type="submit" class="btn btn-primary" th:text="${evento.id == null ? 'Crear Evento' : 'Guardar Cambios'}" style="font-size: 1.1rem; padding: 0.75rem 2rem;">Guardar</button>
                    <a th:href="@{/admin/eventos}" class="btn btn-outline" style="font-size: 1.1rem; padding: 0.75rem 2rem;">Cancelar</a>
                </div>
            </form>
        </div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
</body>
</html>
